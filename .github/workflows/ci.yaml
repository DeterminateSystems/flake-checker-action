name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-check-typescript:
    name: Build and check the TypeScript Action
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Get npm cache directory
        id: npm-cache-directory
        run: |
          echo "directory=$(nix develop --command npm config get cache | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Set up npm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.npm-cache-directory.outputs.directory }}
          key: flake-checker-action-npm-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            flake-checker-action-npm-cache

      - run: nix develop --command npm ci
      - run: nix develop --command npm run format
      - run: nix develop --command npm run lint
      - run: nix develop --command npm run build
      - run: nix develop --command npm run package
      - name: git status
        run: git status --porcelain=v1
      - name: Ensure no unstaged changes
        run: git diff --exit-code
      - name: Ensure no staged changes
        run: git diff --cached --exit-code

  run-x86_64-linux-clean:
    name: Run x86_64 Linux (clean)
    needs: build-check-typescript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check flake.lock
        uses: ./
        with:
          _internal-strict-mode: true

  run-x86_64-linux-dirty:
    name: Run x86_64 Linux (dirty)
    needs: build-check-typescript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check flake.lock
        uses: ./
        with:
          flake-lock-path: flake.dirty.lock
          _internal-strict-mode: true

  run-aarch64-darwin-clean:
    name: Run x86_64 Darwin (clean)
    needs: build-check-typescript
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check flake.lock
        uses: ./
        with:
          _internal-strict-mode: true

  run-aarch64-darwin-dirty:
    name: Run x86_64 Darwin (dirty)
    needs: build-check-typescript
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check flake.lock
        uses: ./
        with:
          flake-lock-path: flake.dirty.lock
          _internal-strict-mode: true

  success:
    name: Success
    permissions:
      contents: read
    needs:
      - run-x86_64-linux-clean
      - run-x86_64-linux-dirty
      - run-aarch64-darwin-clean
      - run-aarch64-darwin-dirty
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - run: "true"
      - run: |
          echo "A dependent in the build matrix failed:"
          echo "$needs"
          exit 1
        env:
          needs: ${{ toJSON(needs) }}
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
